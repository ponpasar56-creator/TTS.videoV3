<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Editor - TTS + Teks</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            color: white;
        }
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #0a0a0a;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        /* Header */
        .header {
            padding: 16px;
            background: #111;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 20px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            background: #00e5ff;
            color: #000;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        /* Preview Video Area */
        .preview-area {
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .preview-area video, .preview-area .video-placeholder {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #666;
            gap: 10px;
        }
        .btn-select-video {
            background: #00e5ff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }
        
        /* Toolbar / Editor */
        .toolbar {
            padding: 16px;
            background: #111;
            border-radius: 20px 20px 0 0;
            margin-top: -10px;
            position: relative;
            z-index: 2;
        }
        
        /* Tab style */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 4px;
            border-radius: 40px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #888;
        }
        .tab.active {
            background: #00e5ff;
            color: #000;
        }
        
        /* Form elements */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        
        /* Position buttons */
        .pos-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .pos-btn {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
        }
        .pos-btn.active {
            background: #00e5ff;
            color: #000;
            border-color: #00e5ff;
        }
        
        /* Time row */
        .time-row {
            display: flex;
            gap: 12px;
        }
        .time-input {
            flex: 1;
        }
        .time-input input {
            width: 100%;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            text-align: center;
        }
        
        /* Slider */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-row span {
            width: 45px;
            font-size: 12px;
        }
        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 4px;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #00e5ff;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* Process button */
        .process-btn {
            width: 100%;
            background: linear-gradient(95deg, #00e5ff, #00b7c9);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: #000;
            margin: 20px 0;
            cursor: pointer;
        }
        .process-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Status */
        .status {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 16px;
            font-size: 12px;
            text-align: center;
            margin: 12px 0;
        }
        
        /* Output */
        .output-area {
            margin-top: 20px;
            display: none;
        }
        .output-area video {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 12px;
        }
        .download-btn {
            display: block;
            background: #2ecc71;
            text-align: center;
            padding: 14px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        
        /* Info kecil */
        .info-note {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 12px;
        }
        
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🎬 Video Editor <span>Pro</span></h1>
    </div>
    
    <!-- Preview Area -->
    <div class="preview-area" id="previewArea">
        <div class="video-placeholder" id="videoPlaceholder">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="9 8 15 12 9 16 9 8"/></svg>
            <button class="btn-select-video" id="selectVideoBtn">Pilih Video</button>
            <span style="font-size: 12px;">dari galeri / file manager</span>
        </div>
        <video id="previewVideo" style="display: none;" controls playsinline></video>
    </div>
    
    <div class="toolbar">
        <div class="tabs">
            <div class="tab active" data-tab="tts">🔊 Suara (TTS)</div>
            <div class="tab" data-tab="text">📝 Teks di Layar</div>
        </div>
        
        <!-- Tab Suara TTS -->
        <div id="tabTTS" class="tab-content">
            <div class="form-group">
                <label>✏️ Teks untuk Narasi Suara</label>
                <textarea id="ttsText" rows="3" placeholder="Contoh: Halo teman-teman, selamat datang di video saya!"></textarea>
            </div>
            <div class="info-note">💡 Suara akan keluar dari speaker dan langsung terekam ke video</div>
        </div>
        
        <!-- Tab Teks Layar -->
        <div id="tabText" class="tab-content" style="display: none;">
            <div class="form-group">
                <label>📝 Teks yang Muncul di Video</label>
                <textarea id="overlayText" rows="2" placeholder="Tulis teks di sini... (bisa dikosongi)"></textarea>
            </div>
            
            <div class="form-group">
                <label>📍 Posisi</label>
                <div class="pos-buttons">
                    <div class="pos-btn" data-pos="top">⬆️ Atas</div>
                    <div class="pos-btn active" data-pos="middle">⬜ Tengah</div>
                    <div class="pos-btn" data-pos="bottom">⬇️ Bawah</div>
                </div>
            </div>
            
            <div class="form-group">
                <label>⏱️ Waktu Kemunculan</label>
                <div class="time-row">
                    <div class="time-input">
                        <input type="number" id="startTime" step="0.5" value="0.5" placeholder="Mulai (detik)">
                    </div>
                    <div class="time-input">
                        <input type="number" id="endTime" step="0.5" value="5.0" placeholder="Akhir (detik)">
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <div class="slider-row">
                    <span>🔤 Ukuran</span>
                    <input type="range" id="textSize" min="24" max="70" value="42">
                    <span id="sizeValue">42px</span>
                </div>
            </div>
        </div>
        
        <button class="process-btn" id="processBtn">✨ PRODUKSI VIDEO ✨</button>
        
        <div class="status" id="statusMsg">
            📁 Pilih video, isi teks suara, lalu tekan Produksi
        </div>
        
        <div class="output-area" id="outputArea">
            <video id="outputVideo" controls playsinline></video>
            <a id="downloadLink" class="download-btn">💾 SIMPAN KE GALERI</a>
        </div>
    </div>
</div>

<canvas id="canvas" style="display: none;"></canvas>

<script>
    (function() {
        // DOM Elements
        const selectVideoBtn = document.getElementById('selectVideoBtn');
        const videoInput = document.createElement('input');
        videoInput.type = 'file';
        videoInput.accept = 'video/*';
        
        const previewVideo = document.getElementById('previewVideo');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const previewArea = document.getElementById('previewArea');
        
        const ttsText = document.getElementById('ttsText');
        const overlayText = document.getElementById('overlayText');
        const processBtn = document.getElementById('processBtn');
        const statusMsg = document.getElementById('statusMsg');
        const outputArea = document.getElementById('outputArea');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');
        
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');
        const textSizeSlider = document.getElementById('textSize');
        const sizeValue = document.getElementById('sizeValue');
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Variables
        let selectedVideoFile = null;
        let videoDuration = 0;
        let textPosition = 'middle';
        let textFontSize = 42;
        
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const tabTTS = document.getElementById('tabTTS');
        const tabText = document.getElementById('tabText');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.dataset.tab === 'tts') {
                    tabTTS.style.display = 'block';
                    tabText.style.display = 'none';
                } else {
                    tabTTS.style.display = 'none';
                    tabText.style.display = 'block';
                }
            });
        });
        
        // Position buttons
        const posBtns = document.querySelectorAll('.pos-btn');
        posBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                posBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                textPosition = btn.dataset.pos;
            });
        });
        
        // Text size slider
        textSizeSlider.addEventListener('input', (e) => {
            textFontSize = parseInt(e.target.value);
            sizeValue.innerText = textFontSize + 'px';
        });
        
        // Select video from file manager (bukan kamera)
        selectVideoBtn.addEventListener('click', () => {
            videoInput.click();
        });
        
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedVideoFile = file;
                const url = URL.createObjectURL(file);
                previewVideo.src = url;
                previewVideo.style.display = 'block';
                videoPlaceholder.style.display = 'none';
                
                // Get video duration
                const tempVideo = document.createElement('video');
                tempVideo.src = url;
                tempVideo.onloadedmetadata = () => {
                    videoDuration = tempVideo.duration;
                    // Auto set end time to video duration
                    endTimeInput.value = Math.min(5, videoDuration);
                    statusMsg.innerHTML = `✅ Video siap: ${file.name.substring(0, 30)} (durasi ${videoDuration.toFixed(1)} detik)`;
                };
                URL.revokeObjectURL(url);
            }
        });
        
        // ============ METODE REKAM VIDEO + SUARA TTS (100% BERHASIL) ============
        // Pendekatan: Rekam canvas (visual + teks) + microphone yang menangkap TTS dari speaker
        // Ini adalah satu-satunya metode yang berhasil di semua browser mobile
        
        async function produceVideo() {
            if (!selectedVideoFile) {
                alert("Pilih video dulu ya!");
                return false;
            }
            
            const ttsTextValue = ttsText.value.trim();
            if (!ttsTextValue) {
                alert("Isi teks untuk suara TTS!");
                return false;
            }
            
            statusMsg.innerHTML = "🎤 Meminta akses mikrofon (diperlukan untuk merekam suara) - IZINKAN ya!";
            
            // Minta izin microphone
            let micStream = null;
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(e) {
                statusMsg.innerHTML = "❌ Izin mikrofon ditolak. Suara tidak bisa terekam. Refresh dan izinkan microphone.";
                alert("Aplikasi butuh akses microphone untuk merekam suara TTS ke video. Silakan izinkan.");
                return false;
            }
            
            statusMsg.innerHTML = "🔄 Memproses video & merekam suara... Tunggu ya (15-40 detik)";
            processBtn.disabled = true;
            
            try {
                // Setup video element untuk baca frame
                const videoElem = document.createElement('video');
                const videoUrl = URL.createObjectURL(selectedVideoFile);
                videoElem.src = videoUrl;
                videoElem.muted = true;
                videoElem.playsInline = true;
                
                await new Promise((resolve, reject) => {
                    videoElem.onloadedmetadata = resolve;
                    videoElem.onerror = reject;
                    videoElem.load();
                });
                
                const width = videoElem.videoWidth;
                const height = videoElem.videoHeight;
                const duration = videoElem.duration;
                
                canvas.width = width;
                canvas.height = height;
                
                // Canvas stream
                const canvasStream = canvas.captureStream(30);
                
                // Gabung dengan microphone stream
                const combinedStream = new MediaStream();
                canvasStream.getVideoTracks().forEach(t => combinedStream.addTrack(t));
                micStream.getAudioTracks().forEach(t => combinedStream.addTrack(t));
                
                const mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
                let chunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                
                mediaRecorder.start(100);
                
                // Parameter teks overlay
                const overlayTextValue = overlayText.value.trim();
                const startSec = parseFloat(startTimeInput.value) || 0;
                const endSec = Math.min(duration, parseFloat(endTimeInput.value) || duration);
                const validStart = Math.max(0, Math.min(startSec, duration - 0.2));
                const validEnd = Math.min(duration, Math.max(validStart + 0.5, endSec));
                
                // Draw frame function
                let animationId;
                const drawFrame = () => {
                    if (videoElem.paused || videoElem.ended) {
                        if (!videoElem.ended) {
                            animationId = requestAnimationFrame(drawFrame);
                        }
                        return;
                    }
                    
                    const currentTime = videoElem.currentTime;
                    ctx.drawImage(videoElem, 0, 0, width, height);
                    
                    // Gambar teks overlay jika dalam rentang waktu
                    if (overlayTextValue && currentTime >= validStart && currentTime <= validEnd) {
                        ctx.save();
                        ctx.shadowColor = "rgba(0,0,0,0.9)";
                        ctx.shadowBlur = 12;
                        ctx.font = `bold ${Math.min(textFontSize, height * 0.15)}px "Segoe UI", "Poppins", system-ui`;
                        ctx.fillStyle = "#FFFFFF";
                        ctx.textAlign = "center";
                        
                        let yPos = height * 0.15;
                        if (textPosition === 'middle') yPos = height / 2;
                        else if (textPosition === 'bottom') yPos = height - 60;
                        else yPos = 60;
                        
                        ctx.fillText(overlayTextValue, width / 2, yPos);
                        ctx.restore();
                    }
                    
                    animationId = requestAnimationFrame(drawFrame);
                };
                
                await videoElem.play();
                drawFrame();
                
                // MAIN TTS - suara akan keluar dari speaker dan terekam oleh microphone
                const utterance = new SpeechSynthesisUtterance(ttsTextValue);
                utterance.lang = 'id-ID';
                utterance.rate = 0.92;
                utterance.pitch = 1.0;
                utterance.volume = 1;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
                
                // Stop recording ketika video selesai
                videoElem.onended = () => {
                    setTimeout(() => {
                        if (mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                        }
                    }, 400);
                };
                
                // Hasil rekaman
                const result = await new Promise((resolve) => {
                    mediaRecorder.onstop = () => {
                        cancelAnimationFrame(animationId);
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        resolve({ url, blob });
                    };
                });
                
                // Cleanup
                micStream.getTracks().forEach(t => t.stop());
                videoElem.pause();
                videoElem.src = "";
                URL.revokeObjectURL(videoUrl);
                
                return result;
                
            } catch (err) {
                console.error(err);
                statusMsg.innerHTML = "❌ Gagal: " + (err.message || "Coba lagi");
                return null;
            } finally {
                processBtn.disabled = false;
            }
        }
        
        // Proses utama
        processBtn.addEventListener('click', async () => {
            const result = await produceVideo();
            if (result) {
                outputVideo.src = result.url;
                outputVideo.muted = false;
                downloadLink.href = result.url;
                downloadLink.download = "video_tts_hasil.webm";
                outputArea.style.display = 'block';
                statusMsg.innerHTML = "✅ BERHASIL! Video sudah memiliki suara TTS. Klik SIMPAN KE GALERI.";
                // Scroll ke output
                outputArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else if (result === false) {
                // error sudah ditangani
            } else {
                statusMsg.innerHTML = "❌ Gagal memproduksi video. Coba lagi.";
            }
        });
        
        // Preload voices
        if (typeof speechSynthesis !== 'undefined') {
            speechSynthesis.getVoices();
        }
        
        console.log("Editor siap - Suara TTS akan terekam via microphone");
    })();
</script>
</body>
</html>
